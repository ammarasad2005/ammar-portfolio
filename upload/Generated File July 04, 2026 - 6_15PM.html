        // Helper to decode Base64 to Float32Array
        function decodeBase64ToFloat32(b64) {
            const binString = atob(b64);
            const len = binString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binString.charCodeAt(i);
            }
            return new Float32Array(bytes.buffer);

                    color = vec3(0.75, 1.0, 0.85); // High intensity hubs glow whiter
                }
                gl_FragColor = vec4(color, alpha * (0.25 + 0.75 * vIntensity));
            }
        `;

        const particleMaterial = new THREE.ShaderMaterial({
            vertexShader: particleVertexShader,
            fragmentShader: particleFragmentShader,
            uniforms: {
                uTime: { value: 0 }
            },
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        // Load points from Base64
        const rawPoints = decodeBase64ToFloat32(POINTS_DATA_B64);
        const numPoints = rawPoints.length / 4;

        const positions = [];
        const intensities = [];

        function addPoint(x, y, z, intensity) {
            positions.push(x, y, z);
            intensities.push(intensity);
        }

        for (let i = 0; i < numPoints; i++) {
            const x = rawPoints[i * 4];
            const y = rawPoints[i * 4 + 1];
            const z = rawPoints[i * 4 + 2];
            const intensity = rawPoints[i * 4 + 3];

            // Front side
            addPoint(x, y, z, intensity);

            // Back side (rotated 180 degrees around Y axis)
            addPoint(-x, y, -z, intensity * 0.85);
        }

        const particleGeometry = new THREE.BufferGeometry();
        particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        particleGeometry.setAttribute('aIntensity', new THREE.Float32BufferAttribute(intensities, 1));

        const pointsObject = new THREE.Points(particleGeometry, particleMaterial);
        globeGroup.add(pointsObject);

        // Load city hubs
        const rawHubs = decodeBase64ToFloat32(HUBS_DATA_B64);
        const numHubs = rawHubs.length / 4;
        const hubsList = [];

        for (let i = 0; i < numHubs; i++) {
            const hx = rawHubs[i * 4];
            const hy = rawHubs[i * 4 + 1];
            const hz = rawHubs[i * 4 + 2];
            
            hubsList.push(new THREE.Vector3(hx, hy, hz));
        }

        // Atmosphere Glow Shader (Fresnel effect)
        const atmosphereVertexShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const atmosphereFragmentShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float intensity = pow(1.0 - max(dot(normal, viewDir), 0.0), 2.8);
                vec3 glowColor = vec3(0.06, 0.88, 0.32);
                gl_FragColor = vec4(glowColor * intensity, intensity * 0.45);
            }
        `;

        const atmosphereMat = new THREE.ShaderMaterial({
            vertexShader: atmosphereVertexShader,
            fragmentShader: atmosphereFragmentShader,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true,
            depthWrite: false
        });

        const atmosphereMesh = new THREE.Mesh(new THREE.SphereGeometry(globeRadius * 1.04, 64, 64), atmosphereMat);
        globeGroup.add(atmosphereMesh);

        // Orbital Ring
        const ringPoints = [];
        const ringRadius = 1.25;
        for (let i = 0; i <= 100; i++) {
            const theta = (i / 100) * Math.PI * 2;
            ringPoints.push(new THREE.Vector3(
                Math.cos(theta) * ringRadius,
                0,
                Math.sin(theta) * ringRadius
            ));
        }
        const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
        const ringMat = new THREE.LineBasicMaterial({
            color: 0x10e653,
            transparent: true,
            opacity: 0.12,
            blending: THREE.AdditiveBlending
        });
        const ringMesh = new THREE.Line(ringGeo, ringMat);
        ringMesh.rotation.x = 0.4;
        ringMesh.rotation.z = 0.2;
        globeGroup.add(ringMesh);

        // Orbital Ring Particles
        const ringParticlesGeo = new THREE.BufferGeometry();
        const ringPartPos = [];
        const ringPartSpeeds = [];
        const numRingParticles = 30;
        for (let i = 0; i < numRingParticles; i++) {
            const angle = Math.random() * Math.PI * 2;
            ringPartPos.push(angle);
            ringPartSpeeds.push(0.005 + Math.random() * 0.01);
        }
        
        const ringPartPositionsFlat = new Float32Array(numRingParticles * 3);
        ringParticlesGeo.setAttribute('position', new THREE.BufferAttribute(ringPartPositionsFlat, 3));
        const ringPartMaterial = new THREE.PointsMaterial({
            color: 0x55ff88,
            size: 0.015,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const ringPointsObject = new THREE.Points(ringParticlesGeo, ringPartMaterial);
        ringPointsObject.rotation.x = 0.4;
        ringPointsObject.rotation.z = 0.2;
        globeGroup.add(ringPointsObject);

        function updateRingParticles() {
            const posAttr = ringPointsObject.geometry.attributes.position;
            for (let i = 0; i < numRingParticles; i++) {
                ringPartPos[i] += ringPartSpeeds[i];
                const angle = ringPartPos[i];
                posAttr.setXYZ(
                    i,
                    Math.cos(angle) * ringRadius,
                    0,
                    Math.sin(angle) * ringRadius
                );
            }
            posAttr.needsUpdate = true;
        }

        // Dynamic Cybersecurity Arcs/Lines
        const activeArcs = [];
        const maxActiveArcs = 35;

        // Custom curve generator
        function createArc(p1, p2) {
            const distance = p1.distanceTo(p2);
            if (distance < 0.2 || distance > 1.8) return null;

            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            const height = distance * 0.22;
            mid.normalize().multiplyScalar(globeRadius + height);

            const actualCurve = new THREE.QuadraticBezierCurve3(p1, mid, p2);

            const points = actualCurve.getPoints(30);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({
                color: 0x10e653,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending
            });
            const lineMesh = new THREE.Line(lineGeo, lineMat);
            globeGroup.add(lineMesh);

            const packetGeo = new THREE.BufferGeometry();
            packetGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(3), 3));
            const packetMat = new THREE.PointsMaterial({
                color: 0x88ffb8,
                size: 0.035,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            const packetMesh = new THREE.Points(packetGeo, packetMat);
            globeGroup.add(packetMesh);

            return {
                curve: actualCurve,
                lineMesh: lineMesh,
                packetMesh: packetMesh,
                progress: Math.random(),
                speed: 0.003 + Math.random() * 0.005
            };
        }

        // Spawn arcs
        function spawnArcs() {
            while (activeArcs.length < maxActiveArcs && hubsList.length > 2) {
                const idx1 = Math.floor(Math.random() * hubsList.length);
                let idx2 = Math.floor(Math.random() * hubsList.length);
                while (idx1 === idx2) {
                    idx2 = Math.floor(Math.random() * hubsList.length);
                }
                const p1 = hubsList[idx1];
                const p2 = hubsList[idx2];
                const arc = createArc(p1, p2);
                if (arc) {
                    activeArcs.push(arc);
                }
            }
        }

        function updateArcs() {
            for (let i = activeArcs.length - 1; i >= 0; i--) {
                const arc = activeArcs[i];
                arc.progress += arc.speed;
                if (arc.progress >= 1.0) {
                    globeGroup.remove(arc.lineMesh);
                    globeGroup.remove(arc.packetMesh);
                    arc.lineMesh.geometry.dispose();
                    arc.lineMesh.material.dispose();
                    arc.packetMesh.geometry.dispose();
                    arc.packetMesh.material.dispose();
                    activeArcs.splice(i, 1);
                } else {
                    const pos = arc.curve.getPointAt(arc.progress);
                    arc.packetMesh.geometry.attributes.position.setXYZ(0, pos.x, pos.y, pos.z);
                    arc.packetMesh.geometry.attributes.position.needsUpdate = true;
                }
            }
            spawnArcs();
        }

        // Hide loading screen once ready
        setTimeout(() => {
            const loader = document.getElementById('loading');
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 1000);
        }, 800);

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            particleMaterial.uniforms.uTime.value = elapsedTime;

            globeGroup.rotation.y = elapsedTime * 0.04;
            globeGroup.rotation.x = Math.sin(elapsedTime * 0.02) * 0.05;

            updateRingParticles();
            updateArcs();

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start
        spawnArcs();
        animate();
    </script>
</body>
</html>
